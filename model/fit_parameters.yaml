# -------------------------
# Target information
# -------------------------
target:
  name: "9139163"
  period: 0.604734  # days
  planetarymasssini: 11.4  # Earth masses

# -------------------------
# Stellar parameters
# -------------------------
stellar:
  teff: 6358  # K
  mass: 1.390  # Solar mass
  radius: 1.558  # Solar radii

# -------------------------
# Model grid being used
# -------------------------
model:
  folder_Kepler: "results_model/"
  filename_Kepler: "model_grid_global_reflection_mode_Kepler"
  folder_TESS: "results_model/"
  filename_TESS: "model_grid_global_reflection_mode_TESS"

data:
  filename_Kepler: "9139163_lc_filtered.txt"
  t0_Kepler: 2454953.5394706232  # BJD_TDB
  filename_TESS: "Cleaned_TIC_164670309_1800s_regularly_sampled_1day_filtered_all_sector.data"
  t0_TESS: 2457000 # BJD_TDB
  tinf_RV: 2459664.753 # BJD_TDB, time of inferior conjunction


# -------------------------
# Fitting options
# -------------------------
fitting:
  fit_dataset: "Both"  # TESS, Kepler or Both
  fitting_method: "NS" # Least square "LS" or Nested Sampling "NS"
  use_uniform_albedo: true  # reflection will be centered on phase 0.5

  # Inclination options
  fit_inclination: True
  fixed_inclination: None # 17 28.25 39.5  50.75 62. degrees

  # Gravity options
  fit_gravitational_effects: false  # Gravitational effects (Doppler beaming, Ellipsoidal distortion) are fitted
  add_gravitational_model: true  # or added

# -------------------------
# Output options
# -------------------------
output:
  root_folder: "fit"
